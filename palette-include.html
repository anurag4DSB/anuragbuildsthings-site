<div id="cmd-palette" class="palette-overlay" data-open="false" aria-hidden="true">
  <div class="palette" role="dialog" aria-modal="true" aria-label="Search and commands">
    <div class="palette-head">
      <svg class="palette-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m20 20-3.5-3.5"></path>
      </svg>
      <input id="palette-input" type="text" placeholder="Search posts, run a command…" autocomplete="off" spellcheck="false" />
      <span class="kbd">⌘K</span>
    </div>
    <div class="palette-scopes" role="tablist">
      <button class="on" data-scope="all" role="tab">All <span class="count">0</span></button>
      <button data-scope="posts" role="tab">Posts <span class="count">0</span></button>
      <button data-scope="sections" role="tab">Sections <span class="count">0</span></button>
      <button data-scope="actions" role="tab">Actions <span class="count">0</span></button>
    </div>
    <div class="palette-list" id="palette-list" role="listbox"></div>
    <div class="palette-foot">
      <div class="keys">
        <span><kbd>↑↓</kbd>navigate</span>
        <span><kbd>↩</kbd>open</span>
        <span><kbd>⌘↩</kbd>new tab</span>
        <span><kbd>esc</kbd>close</span>
      </div>
      <div>search</div>
    </div>
  </div>
</div>
<script src="/palette.js" defer></script>
