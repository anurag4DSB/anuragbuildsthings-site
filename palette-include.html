<div id="cmd-palette" class="palette-overlay" data-open="false" aria-hidden="true">
  <div class="palette" role="dialog" aria-modal="true" aria-label="Search and commands">
    <div class="palette-head">
      <svg class="palette-icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
        <path d="M16.041 15.856c-0.034 0.026-0.067 0.055-0.099 0.087s-0.060 0.064-0.087 0.099c-1.258 1.213-2.969 1.958-4.855 1.958-1.933 0-3.682-0.782-4.95-2.050s-2.050-3.017-2.050-4.95 0.782-3.682 2.050-4.95 3.017-2.050 4.95-2.050 3.682 0.782 4.95 2.050 2.050 3.017 2.050 4.95c0 1.886-0.745 3.597-1.959 4.856zM21.707 20.293l-3.675-3.675c1.231-1.54 1.968-3.493 1.968-5.618 0-2.485-1.008-4.736-2.636-6.364s-3.879-2.636-6.364-2.636-4.736 1.008-6.364 2.636-2.636 3.879-2.636 6.364 1.008 4.736 2.636 6.364 3.879 2.636 6.364 2.636c2.125 0 4.078-0.737 5.618-1.968l3.675 3.675c0.391 0.391 1.024 0.391 1.414 0s0.391-1.024 0-1.414z"></path>
      </svg>
      <input id="palette-input" type="text" placeholder="Search posts, jump anywhere..." autocomplete="off" spellcheck="false" />
      <span class="kbd">⌘K</span>
    </div>
    <div class="palette-scopes" role="tablist">
      <button class="on" data-scope="all" role="tab">All <span class="count">0</span></button>
      <button data-scope="posts" role="tab">Posts <span class="count">0</span></button>
      <button data-scope="sections" role="tab">Sections <span class="count">0</span></button>
      <button data-scope="actions" role="tab">Actions <span class="count">0</span></button>
    </div>
    <div class="palette-list" id="palette-list" role="listbox"></div>
    <div class="palette-foot">
      <div class="keys">
        <span><kbd>↑↓</kbd>navigate</span>
        <span><kbd>↩</kbd>open</span>
        <span><kbd>⌘↩</kbd>new tab</span>
        <span><kbd>esc</kbd>close</span>
      </div>
      <div>search</div>
    </div>
  </div>
</div>
<script src="/palette.js" defer></script>
