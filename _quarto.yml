project:
  type: website
  resources:
    - CNAME
    - post-enhance.js
    - favicon-32.png
    - favicon-192.png
    - favicon-512.png
    - og-default.png
  render:
    - "*.qmd"
    - "posts/"
    - "!quarto-web/"
    - "!.planning/"

website:
  title: "anurag builds things"
  site-url: "https://anuragbuildsthings.com/"
  description: "Projects, experiments, and systems built in public."
  image: og-default.png
  open-graph: true
  llms-txt: true
  google-analytics:
    tracking-id: "G-2QD3FPQKQ8"
    anonymize-ip: true
    storage: none
  search:
    location: navbar
    type: overlay
  navbar:
    background: light
    pinned: true
    search: true
    tools:
      - icon: youtube
        href: https://www.youtube.com/@AnuragBuildsThings
        aria-label: YouTube
      - icon: linkedin
        href: https://www.linkedin.com/in/mittalanu/
        aria-label: LinkedIn
      - icon: github
        href: https://github.com/anurag4dsb
        aria-label: GitHub
  page-footer:
    border: false
    left: |
      <div class="footer-col">
        <p>For the next person who has to build one.</p>
      </div>
    center: |
      <div class="footer-col">
        <p>Anurag Mittal © 2026</p>
      </div>
    right: |
      <div class="footer-col">
        <p><a href="#top">Back to top</a></p>
      </div>
  back-to-top-navigation: true
  page-navigation: true

format:
  html:
    theme:
      light: [cosmo, styles.css]
      dark: [darkly, styles.css]
    include-in-header:
      text: |
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
        <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
        <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png">
    toc: true
    toc-location: left
    code-copy: true
    code-overflow: wrap
    monofont: "JetBrains Mono"
    fontsize: 1em
    highlight-style: github-dark
    date-format: "DD MMM YYYY"
    include-after-body:
      - post-enhance-include.html

execute:
  freeze: auto
