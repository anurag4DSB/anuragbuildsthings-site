project:
  type: website
  resources:
    - CNAME
  render:
    - "*.qmd"
    - "posts/"
    - "!quarto-web/"
    - "!.planning/"

website:
  title: "Anurag builds things"
  site-url: "https://anuragbuildsthings.com/"
  description: "Projects, experiments, and systems built in public."
  open-graph: true
  llms-txt: true
  google-analytics:
    tracking-id: "G-2QD3FPQKQ8"
    anonymize-ip: true
    storage: none
  search:
    location: navbar
    type: overlay
  navbar:
    background: light
    search: true
    tools:
      - icon: youtube
        href: https://www.youtube.com/@AnuragBuildsThings
        aria-label: YouTube
      - icon: linkedin
        href: https://www.linkedin.com/in/mittalanu/
        aria-label: LinkedIn
      - icon: github
        href: https://github.com/anurag4dsb
        aria-label: GitHub
  back-to-top-navigation: true
  page-navigation: true

format:
  html:
    theme:
      light: [cosmo, styles.css]
      dark: [darkly, styles.css]
    toc: true
    toc-location: left
    code-copy: true
    code-overflow: wrap
    mainfont: "Newsreader"
    monofont: "JetBrains Mono"
    fontsize: 1em
    highlight-style: github
    date-format: "MMM YYYY"

execute:
  freeze: auto
