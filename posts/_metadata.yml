format:
  html:
    include-after-body:
      - text: |
          <script>
          document.addEventListener('DOMContentLoaded', function() {
            const titleBlock = document.getElementById('title-block-header');
            if (!titleBlock) return;

            const currentUrl = window.location.pathname;
            const llmsUrl = currentUrl.replace(/\.html$/, '.llms.md');

            const container = document.createElement('div');
            container.className = 'copy-page-group';
            container.innerHTML = `
              <button class="copy-page-btn" aria-label="Copy page">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M13 5H6.5C5.67 5 5 5.67 5 6.5V13C5 13.83 5.67 14.5 6.5 14.5H13C13.83 14.5 14.5 13.83 14.5 13V6.5C14.5 5.67 13.83 5 13 5Z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M2.5 10H2C1.6 10 1.22 9.84 0.94 9.56C0.66 9.28 0.5 8.9 0.5 8.5V2C0.5 1.6 0.66 1.22 0.94 0.94C1.22 0.66 1.6 0.5 2 0.5H8.5C8.9 0.5 9.28 0.66 9.56 0.94C9.84 1.22 10 1.6 10 2V2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Copy page
              </button>
              <button class="copy-page-chevron" aria-label="More actions">
                <svg width="8" height="5" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1L5 5L9 1"/></svg>
              </button>
              <div class="copy-page-dropdown" style="display:none;">
                <button class="copy-page-menu-item" data-action="copy">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 5H6.5C5.67 5 5 5.67 5 6.5V13C5 13.83 5.67 14.5 6.5 14.5H13C13.83 14.5 14.5 13.83 14.5 13V6.5C14.5 5.67 13.83 5 13 5Z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2.5 10H2C1.6 10 1.22 9.84 0.94 9.56C0.66 9.28 0.5 8.9 0.5 8.5V2C0.5 1.6 0.66 1.22 0.94 0.94C1.22 0.66 1.6 0.5 2 0.5H8.5C8.9 0.5 9.28 0.66 9.56 0.94C9.84 1.22 10 1.6 10 2V2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <div>
                    <strong>Copy page</strong>
                    <span>Copy page as Markdown for LLMs</span>
                  </div>
                </button>
                <button class="copy-page-menu-item" data-action="view">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2H2v12h12v-4"/><path d="M9 1h6v6"/><path d="M15 1L7 9"/></svg>
                  <div>
                    <strong>View as Markdown</strong>
                    <span>View this page as plain text</span>
                  </div>
                </button>
              </div>
            `;

            // Create right column: copy button + published date stacked
            var h1 = titleBlock.querySelector('h1.title');
            var meta = titleBlock.querySelector('.quarto-title-meta');
            if (h1) {
              var rightCol = document.createElement('div');
              rightCol.className = 'title-right-col';
              rightCol.appendChild(container);
              if (meta) rightCol.appendChild(meta);

              var wrapper = document.createElement('div');
              wrapper.className = 'title-copy-row';
              h1.parentNode.insertBefore(wrapper, h1);
              wrapper.appendChild(h1);
              wrapper.appendChild(rightCol);
            } else {
              titleBlock.appendChild(container);
            }

            async function copyPage() {
              try {
                const response = await fetch(llmsUrl);
                const text = await response.text();
                await navigator.clipboard.writeText(text);
                const btn = container.querySelector('.copy-page-btn');
                const original = btn.innerHTML;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.innerHTML = original, 2000);
              } catch(e) {
                console.error('Copy failed:', e);
              }
            }

            container.querySelector('.copy-page-btn').addEventListener('click', copyPage);

            const dropdown = container.querySelector('.copy-page-dropdown');
            container.querySelector('.copy-page-chevron').addEventListener('click', function(e) {
              e.stopPropagation();
              dropdown.style.display = dropdown.style.display === 'none' ? 'flex' : 'none';
            });

            dropdown.querySelector('[data-action="copy"]').addEventListener('click', function() {
              dropdown.style.display = 'none';
              copyPage();
            });

            dropdown.querySelector('[data-action="view"]').addEventListener('click', function() {
              dropdown.style.display = 'none';
              window.open(llmsUrl, '_blank');
            });


            document.addEventListener('click', function() { dropdown.style.display = 'none'; });
            container.addEventListener('click', function(e) { e.stopPropagation(); });
          });
          </script>
