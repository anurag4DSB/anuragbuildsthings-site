<script src="/post-enhance.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var t = document.querySelector('.navbar-title');
    if (t) t.textContent = 'anurag builds things';

    // External social links open in a new tab. Exclude the dark-mode toggle
    // — Quarto renders it with an http href pointing at the current page.
    document.querySelectorAll('.navbar .quarto-navigation-tool[href^="http"]:not(.quarto-color-scheme-toggle)').forEach(function (a) {
      if (!a.getAttribute('target')) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      }
    });

    // Wrap tools + search in one flex item so they wrap to the next line
    // as a group when the navbar row can't fit them beside the brand.
    var tools = document.querySelector('.quarto-navbar-tools');
    var search = document.querySelector('#quarto-search');
    var group = null;
    if (tools && search && tools.parentElement === search.parentElement &&
        !tools.closest('.navbar-icon-group')) {
      group = document.createElement('div');
      group.className = 'navbar-icon-group';
      tools.parentElement.insertBefore(group, tools);
      group.appendChild(tools);
      group.appendChild(search);
    } else {
      group = document.querySelector('.navbar-icon-group');
    }

    // Inject a hamburger button that shows the icon group on narrow screens.
    // CSS hides the group + shows the hamburger below the 576px breakpoint;
    // clicking toggles .is-open on the group, which CSS reveals as a small
    // dropdown panel anchored to the navbar right edge.
    if (group && !document.querySelector('.navbar-hamburger')) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'navbar-hamburger';
      btn.setAttribute('aria-label', 'Menu');
      btn.setAttribute('aria-expanded', 'false');
      btn.innerHTML = '<i class="bi bi-list" aria-hidden="true"></i>';
      group.parentElement.insertBefore(btn, group);

      var close = function () {
        group.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      };
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = group.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
      document.addEventListener('click', function (e) {
        if (!group.classList.contains('is-open')) return;
        if (group.contains(e.target) || btn.contains(e.target)) return;
        close();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && group.classList.contains('is-open')) {
          close();
          btn.focus();
        }
      });
    }
  });
</script>
